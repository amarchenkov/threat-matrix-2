version: 2.1
jobs:
  build:
    machine:
      image: ubuntu-2204:2024.11.1
    steps:
      - checkout
      - run:
          name: Agent scan
          command: |          
            echo "--------------BOM---------------"
            touch bom.xml
            mvn -U -q org.cyclonedx:cyclonedx-maven-plugin:2.7.9:makeBom -DoutputFormat=xml -DoutputName=bom -f pom.xml
            cat target/bom.xml
            echo "--------------START SCANNING---------------"
            git remote -v
            echo $CIRCLECI
            echo $CIRCLE_PULL_REQUEST
            echo $CIRCLE_REPOSITORY_URL
            echo $CIRCLE_BRANCH
            echo $CIRCLE_PROJECT_USERNAME
            echo $CIRCLE_PROJECT_REPONAME
            CIRCLE_REPOSITORY_URL=$(git remote get-url origin)
            CIRCLE_PROJECT_USERNAME=amarchenkov
            printenv > host.env
            echo "---------------------------------------------------------------"
            cat host.env
            echo "---------------------------------------------------------------"
            # docker run -v $(pwd):/app --env-file=host.env threatrix/threat-agent --env=dev --verbose --app-name=threat-matrix-2 --tags=circleci-image ./
