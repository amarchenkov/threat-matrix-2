version: 2.1
jobs:
  build:
    docker:
      - image: alpine:latest
    steps:
      - checkout
      - run:
          name: Agent scan
          environment:
            THREATRIX_API_KEY: ${{ secrets.THREATRIX_API_KEY }}
            THREATRIX_OID: ${{ secrets.THREATRIX_OID }}
            THREATRIX_EID: ${{ secrets.THREATRIX_EID }}
            THREATCENTER_SERVER: ${{ secrets.THREATCENTER_SERVER }}
          command: |
            echo "DIR = $(pwd)"
            ls -alh
            echo "START SCANNING $MY_ENV_VAR"
