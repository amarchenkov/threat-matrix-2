version: 2.1
jobs:
  build:
    machine: # executor type
      - image: ubuntu-2004:202010-01
    steps:
      - checkout
      - run:
          name: Agent scan
          command: |
            echo "DIR = $(pwd)"
            ls -alh
            echo "START SCANNING"
            printenv > host.env
            docker login -u $DOCKER_LOGIN -p $DOCKER_PASSWORD
            docker pull alpine:latest
            docker run -v $(pwd):/app --env-file=host.env threatrix/threat-agent --env=dev --app-name=threat-matrix-2 --tags=circleci-image ./
