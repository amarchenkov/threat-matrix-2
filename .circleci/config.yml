version: 2.1
jobs:
  build:
    machine:
      image: ubuntu-2204:2024.11.1
    steps:
      - checkout
      - run:
          name: Agent scan
          command: |
            echo "DIR = $(pwd)"
            ls -alh
            echo "START SCANNING"
            printenv > host.env
            docker login -u $DOCKER_LOGIN -p $DOCKER_PASSWORD
            docker run -v $(pwd):/app threatrix/threat-agent --oid=$THREATRIX_OID --eid=$THREATRIX_EID --api-key=$THREATRIX_API_KEY --server-url=$THREATCENTER_SERVER --verbose --env=dev --app-name=threat-matrix-2 --tags=circleci-image ./
